<!DOCTYPE html>
<html>
<head>
    <title>Note App</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #ffe6f0;
    text-align:center;
    padding-top:80px;
}

h1{
    color:#d63384;
    margin-bottom:40px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
    width:200px;
    margin:auto;
}

button{
    background:#ffb6d9;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

button:hover{
    background:#ff8fc5;
    transform:scale(1.05);
}

</style>

</head>

<body>

<h1>🌸 Note Manager 🌸</h1>

<div class="menu">

<button onclick="location.href='http://127.0.0.1:8000/get'">📄 Посмотреть заметки</button>

<button onclick="location.href='/post'">➕ Создать заметку</button>

<button onclick="location.href='/put'">✏ Полностью изменить</button>

<button onclick="location.href='/patch'">🩹 Частично изменить</button>

<button onclick="location.href='/delete'">🗑 Удалить заметку</button>

</div>

</body>
</html>
